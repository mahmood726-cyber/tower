<!-- Resilience & Assurance Panel - Injected by tower_dashboard_plus.sh -->
<style>
  .resilience-panel {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    padding: 12px 16px;
    margin: 0 0 16px 0;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .resilience-panel.status-green {
    background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
    border: 1px solid #28a745;
  }
  .resilience-panel.status-yellow {
    background: linear-gradient(135deg, #fff3cd 0%, #ffeeba 100%);
    border: 1px solid #ffc107;
  }
  .resilience-panel.status-red {
    background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
    border: 1px solid #dc3545;
  }
  .resilience-panel.status-freeze {
    background: linear-gradient(135deg, #cce5ff 0%, #b8daff 100%);
    border: 2px solid #004085;
  }
  .resilience-panel.status-unknown {
    background: linear-gradient(135deg, #e2e3e5 0%, #d6d8db 100%);
    border: 1px solid #6c757d;
  }
  .resilience-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .resilience-badge.badge-green {
    background: #28a745;
    color: white;
  }
  .resilience-badge.badge-yellow {
    background: #ffc107;
    color: #856404;
  }
  .resilience-badge.badge-red {
    background: #dc3545;
    color: white;
  }
  .resilience-badge.badge-freeze {
    background: #004085;
    color: white;
    animation: pulse 2s infinite;
  }
  .resilience-badge.badge-unknown {
    background: #6c757d;
    color: white;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  .resilience-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: currentColor;
  }
  .resilience-metrics {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .resilience-metric {
    display: flex;
    flex-direction: column;
    font-size: 12px;
  }
  .resilience-metric-label {
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 10px;
  }
  .resilience-metric-value {
    font-weight: 600;
    font-size: 14px;
  }
  .resilience-alerts {
    margin-left: auto;
    display: flex;
    gap: 8px;
  }
  .resilience-alert-tag {
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .resilience-alert-tag.tag-freeze {
    background: #004085;
    color: white;
  }
  .resilience-alert-tag.tag-spc {
    background: #6f42c1;
    color: white;
  }
  .resilience-alert-tag.tag-drift {
    background: #fd7e14;
    color: white;
  }
  .resilience-alert-tag.tag-budget {
    background: #e83e8c;
    color: white;
  }
  .resilience-timestamp {
    font-size: 10px;
    color: #888;
    margin-left: auto;
  }
</style>

<div class="resilience-panel status-{{STATUS_LOWER}}">
  <div class="resilience-badge badge-{{STATUS_LOWER}}">
    <span class="resilience-indicator"></span>
    {{STATUS}}
  </div>

  <div class="resilience-metrics">
    <div class="resilience-metric">
      <span class="resilience-metric-label">Error Budget</span>
      <span class="resilience-metric-value">{{ERROR_BUDGET_REMAINING}}</span>
    </div>
    <div class="resilience-metric">
      <span class="resilience-metric-label">SLO Status</span>
      <span class="resilience-metric-value">{{SLO_STATUS}}</span>
    </div>
    <div class="resilience-metric">
      <span class="resilience-metric-label">Cards Active</span>
      <span class="resilience-metric-value">{{ACTIVE_CARDS}}</span>
    </div>
  </div>

  <div class="resilience-alerts">
    {{ALERT_TAGS}}
  </div>

  <span class="resilience-timestamp">Updated: {{TIMESTAMP}}</span>
</div>
<!-- End Resilience Panel -->
